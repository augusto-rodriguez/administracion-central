services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alarmas_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
    networks:
      - alarmas_network

  mysql:
    image: mysql:8.0
    container_name: alarmas_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: alarmas_central
      MYSQL_USER: alarmas
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - alarmas_network

networks:
  alarmas_network:
    driver: bridge

volumes:
  mysql_data: